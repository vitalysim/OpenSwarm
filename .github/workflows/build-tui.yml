name: Build TUI Binaries

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        working-directory: third_party/agentswarm-cli-dev
        run: bun install

      - name: Build binary
        working-directory: third_party/agentswarm-cli-dev/packages/opencode
        run: bun run script/build.ts --single --skip-install

      - name: Rename binary (Unix)
        if: matrix.platform != 'windows'
        run: |
          mv third_party/agentswarm-cli-dev/packages/opencode/dist/agentswarm-cli-${{ matrix.platform }}-${{ matrix.arch }}/bin/agentswarm \
             agency-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Rename binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Move-Item third_party/agentswarm-cli-dev/packages/opencode/dist/agentswarm-cli-${{ matrix.platform }}-${{ matrix.arch }}/bin/agentswarm.exe `
            agency-${{ matrix.platform }}-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agency-${{ matrix.platform }}-${{ matrix.arch }}
          path: agency-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.platform == 'windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
